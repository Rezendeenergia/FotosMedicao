services:
  - type: web
    name: rezende-energia
    runtime: python
    repo: https://github.com/seu-usuario/rezende-energia
    plan: free
    region: sao-paulo
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --timeout 120 --workers 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
    healthCheckPath: /health
    autoDeploy: true
